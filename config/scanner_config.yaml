# =========================
# Scanner Configuration
# =========================

# Basic scan settings
timeout: 30         # Seconds to wait per request
verify_ssl: false   # Set to true for sites with valid certificates
user_agent: "WebSecurityScanner/1.0"
target_url: ""      # Set at runtime via --url
active_tests: false

# Module list (simple and explicit)
modules:
  - recon
  -exploitation

# Result handling
result_deduplication: true

